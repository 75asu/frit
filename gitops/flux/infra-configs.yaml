---
# Flux Kustomization — infra-configs layer.
# Applies ClusterSecretStore after infra (ESO) is Ready so the CRD exists.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-configs
  namespace: flux-system
spec:
  dependsOn:
    - name: infra
  interval: 10m
  path: ./gitops/infra-configs
  prune: true
  sourceRef:
    kind: GitRepository
    name: frit
