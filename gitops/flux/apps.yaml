---
# Flux Kustomization — apps layer (wave 1).
# Deploys: Prometheus+Grafana, vLLM, Open WebUI, Langfuse.
# Waits for infra to be healthy before proceeding.
#
# Note: ExternalSecrets in apps/ will fail until bootstrap.yaml finishes
# Vault configuration (init + unseal + K8s auth + secret seeding).
# ESO retries automatically — apps pods start once secrets are available.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  path: ./gitops/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: frit
  dependsOn:
    - name: infra
