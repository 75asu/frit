---
# Open WebUI — self-hosted Claude.ai equivalent.
# Connects to the LiteLLM gateway (OpenAI-compatible /v1); LiteLLM routes to the vLLM router.
# Accessible at http://webui.frit.local via Traefik ingress.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
  namespace: open-webui
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: open-webui
      version: "6.*"
      sourceRef:
        kind: HelmRepository
        name: open-webui
        namespace: flux-system
  values:
    # Disable bundled Ollama — we're using vLLM instead
    ollama:
      enabled: false
    # LiteLLM gateway endpoint (OpenAI-compatible). LiteLLM proxies to the vLLM router.
    openaiBaseApiUrl: "http://litellm.litellm.svc.cluster.local:4000/v1"
    persistence:
      enabled: true
      storageClass: local-path
      size: 5Gi
    ingress:
      enabled: true
      class: traefik
      host: webui.frit.local
      tls: false
