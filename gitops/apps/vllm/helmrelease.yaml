---
# vLLM production-stack — the CoreWeave/CNCF reference inference deployment.
# Router: prefix-aware routing (routes to node holding matching KV cache prefix).
# Engine: single T4 (16GB), Qwen3-4B-Instruct-2507 (fp16, ~8GB weights).
# Model weights: cached on hostPath /var/lib/frit-models, mounted at HF_HOME's hub dir so they persist across restarts.
# HF token: pulled from Vault via hf-token ExternalSecret (Qwen3 is ungated; kept for gated models).
#
# Chart schema: servingEngineSpec.modelSpec (NOT a top-level "models" key).
# Omitting pvcStorage prevents PVC creation — use hostPath extraVolumes instead.
# requestGPUType defaults to nvidia.com/gpu when not set (correct for T4).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vllm
  namespace: vllm
spec:
  interval: 1h
  timeout: 30m
  chart:
    spec:
      chart: vllm-stack
      version: "0.*"
      sourceRef:
        kind: HelmRepository
        name: vllm
        namespace: flux-system
  values:
    servingEngineSpec:
      enableEngine: true
      # Probe tuning. The chart's default engine probes omit timeoutSeconds, so k8s
      # applies its 1s default. Under load vLLM's event loop can't answer /health within
      # 1s -> 3 misses -> the LIVENESS probe SIGTERMs a healthy-but-busy engine (we saw
      # exitCode 0 "Completed" + restarts during load). Liveness must only fire on a true
      # hang; readiness is what should react to "busy". So:
      #   startupProbe  -> generous window for the slow model load (~2-3 min on a T4)
      #   livenessProbe -> long timeout + high threshold; restart only if genuinely wedged
      #   readinessProbe-> moderate; pulls the pod from Endpoints if it can't serve
      # chart.templateProbe supplies the httpGet /health:8000 action; we set only timing.
      startupProbe:
        initialDelaySeconds: 15
        periodSeconds: 10
        failureThreshold: 30    # ~5 min budget to finish loading before giving up
        timeoutSeconds: 5
      livenessProbe:
        periodSeconds: 15
        timeoutSeconds: 10      # tolerate a busy event loop; don't kill on a slow /health
        failureThreshold: 6     # only restart after ~90s of genuine unresponsiveness
      readinessProbe:
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      # Single GPU: Recreate (not RollingUpdate) so the old pod releases the GPU
      # before the new one starts -- otherwise a model swap deadlocks (the new pod
      # sits Pending forever waiting for the only GPU the old pod still holds).
      strategy:
        type: Recreate
      # Replace the default modelSpec array (which has mistral+PVC) with only phi3.
      # Helm will delete vllm-mistral-engine-service and vllm-mistral-storage-claim
      # since they are no longer rendered by this modelSpec.
      modelSpec:
        - name: qwen3
          enabled: true
          modelURL: "Qwen/Qwen3-4B-Instruct-2507"
          repository: "lmcache/vllm-openai"
          tag: "latest"
          runtimeClassName: "nvidia"
          replicaCount: 1
          requestCPU: "4"
          requestMemory: "16Gi"
          requestGPU: 1
          # HF_HOME must point INTO the mounted cache below. The chart defaults it to
          # /tmp (ephemeral), so without this weights re-download on every restart.
          env:
            - name: HF_HOME
              value: /root/.cache/huggingface
          # No pvcStorage key — prevents PVC creation.
          # Model weights live on the hostPath below.
          hf_token:
            secretName: "hf-token"
            secretKey: "token"
          extraVolumes:
            - name: model-cache
              hostPath:
                path: /var/lib/frit-models
                type: DirectoryOrCreate
          extraVolumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface/hub  # HF default cache path
          vllmConfig:
            v0: "1"
            maxModelLen: 4096
            enablePrefixCaching: true
            dtype: float16  # T4 (Turing) has no bf16; pin fp16 to avoid a load-time error
            gpuMemoryUtilization: 0.9
            tensorParallelSize: 1
          lmcacheConfig:
            enabled: false  # disable LMCache until engine is stable

    routerSpec:
      replicaCount: 1
      routing: "prefix"  # prefix-aware routing (CoreWeave pattern)
      ingress:
        enabled: true
        className: traefik
        host: vllm.frit.local
      # Give the router time to survive while the engine loads the model (~2-3 min on T4)
      startupProbe:
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 30   # 155s window to start
      livenessProbe:
        initialDelaySeconds: 120  # wait 2min before first liveness check
        periodSeconds: 5
        failureThreshold: 60   # then allow 5min of /health failures while engine connects

    serviceMonitor:
      enabled: true  # exposes TTFT, TBT, queue depth, KV cache hit rate to Prometheus
