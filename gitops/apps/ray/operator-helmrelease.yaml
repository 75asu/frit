---
# KubeRay operator: installs the Ray CRDs + controllers (watches all namespaces).
# CPU-only and tiny; the GPU work happens in the RayService worker pods.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kuberay-operator
  namespace: ray
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: kuberay-operator
      version: "1.*"
      sourceRef:
        kind: HelmRepository
        name: kuberay
        namespace: flux-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
