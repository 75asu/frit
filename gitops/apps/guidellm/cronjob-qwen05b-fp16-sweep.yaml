# A benchmark "run recipe" as a SUSPENDED CronJob (sibling of the -sync recipe).
# Flux owns this template; it NEVER fires on its own (suspend: true). Trigger with:
#
#   kubectl -n bench create job qwen05b-fp16-sweep-r1 \
#     --from=cronjob/bench-qwen05b-fp16-sweep
#
# This recipe: qwen-05b (fp16) on the Ray Serve endpoint, SWEEP profile. guidellm
# runs a synchronous pass (latency floor / min rate), a throughput pass (ceiling),
# then interpolates constant-rate passes between them (sweep_size total = 10). The
# result is the latency-vs-load curve: where the T4 saturates and the SLO-attainable
# throughput. 20s per strategy. Writes a multi-benchmark json to the shared PVC.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: bench-qwen05b-fp16-sweep
  namespace: bench
  labels:
    app.kubernetes.io/name: guidellm
    bench.frit/model: qwen-05b
    bench.frit/precision: fp16
    bench.frit/profile: sweep
spec:
  schedule: "0 0 1 1 *"        # dummy (never effectively fires); suspended anyway
  suspend: true                # <- Flux keeps it; it only runs when triggered
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 0          # don't retry: surface errors immediately
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: guidellm
        spec:
          restartPolicy: Never
          securityContext:
            runAsUser: 0        # write freely to the local-path PVC + HF cache (lab)
            fsGroup: 0
          containers:
            - name: guidellm
              image: ghcr.io/vllm-project/guidellm:v0.7.1-amd64   # pinned; :latest is arm64-only single-arch (exec format error on amd64)
              workingDir: /tmp
              env:
                - name: HF_HOME
                  value: /tmp/hf
              command:
                - guidellm
                - run
                - --backend
                - kind=openai_http,target=http://frit-serve-serve-svc.ray.svc.cluster.local:8000/qwen-05b,model=qwen-05b,validate_backend=false
                - --tokenizer
                - kind=huggingface_auto,model=Qwen/Qwen2.5-0.5B-Instruct
                - --data
                - kind=synthetic_text,prompt_tokens=256,output_tokens=128
                - --profile
                - kind=sweep,sweep_size=10          # sync + throughput + 8 interpolated constant rates
                - --constraint
                - kind=max_duration,seconds=30       # per strategy (long enough for the high-concurrency throughput pass to drain + complete requests)
                - --output
                - kind=json,path=/results/qwen05b-fp16-sweep.json
              volumeMounts:
                - name: results
                  mountPath: /results
          volumes:
            - name: results
              persistentVolumeClaim:
                claimName: bench-results
