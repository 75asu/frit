---
# ClusterSecretStore — connects ESO to Vault using K8s auth.
# Will show as failed until bootstrap.yaml finishes Vault configuration.
# ESO retries every refreshInterval — becomes Ready automatically once Vault
# is initialized, unsealed, and the K8s auth role is configured.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
