---
# CloudNativePG operator -- manages Postgres Clusters via the postgresql.cnpg.io CRDs.
# Backs the LiteLLM proxy DB (virtual keys, spend tracking, admin UI).
# Chosen over the litellm chart's bundled Bitnami Postgres (Bitnami free images are
# deprecated in 2025/26). CNPG is a widely used, production-grade Postgres operator.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: cnpg-system
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.28.x"
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: flux-system
  values:
    crds:
      create: true
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        memory: 200Mi
