---
# frit — local Mac setup
#
# Run once per machine before provisioning the studio:
#   make keys
#
# What this does:
#   1. Downloads ~/.lightning/lightning_rsa from Lightning.ai (idempotent)
#   2. Derives the studio's SSH username via the SDK
#   3. Writes a Host frit block into ~/.ssh/config (idempotent)
#   4. Smoke-tests the SSH connection
#
# Idempotent — safe to re-run. Key download is skipped if the file exists.

- name: frit local machine setup
  hosts: localhost
  connection: local

  vars:
    lightning_api_key:  "{{ lookup('env', 'LIGHTNING_API_KEY') }}"
    lightning_user_id:  "{{ lookup('env', 'LIGHTNING_USER_ID') }}"
    studio_name:        "{{ lookup('env', 'STUDIO_NAME') | default('frit') }}"
    studio_teamspace:   "{{ lookup('env', 'STUDIO_TEAMSPACE') }}"
    studio_user:        "{{ lookup('env', 'STUDIO_USER') }}"
    ssh_key_path:       "{{ lookup('env', 'HOME') }}/.lightning/lightning_rsa"

  tasks:

    # ── Prereqs ──────────────────────────────────────────────────────────────

    - name: assert required env vars are set
      assert:
        that:
          - lightning_api_key != ""
          - lightning_user_id != ""
          - studio_teamspace  != ""
          - studio_user       != ""
        fail_msg: "Source your .env before running: set -a && source .env && set +a"

    - name: ensure ~/.lightning directory exists
      file:
        path: "{{ lookup('env', 'HOME') }}/.lightning"
        state: directory
        mode: "0700"

    - name: ensure ~/.ssh directory exists
      file:
        path: "{{ lookup('env', 'HOME') }}/.ssh"
        state: directory
        mode: "0700"

    # ── SSH key download ──────────────────────────────────────────────────────

    - name: check if lightning SSH key already exists
      stat:
        path: "{{ ssh_key_path }}"
      register: ssh_key_stat

    - name: generate a one-time key ID for this download
      command: python3 -c "import uuid; print(uuid.uuid4())"
      register: key_id
      when: not ssh_key_stat.stat.exists
      changed_when: false

    - name: download SSH private key from Lightning.ai
      uri:
        url: "https://lightning.ai/setup/ssh-gen?t={{ lightning_api_key }}&id={{ key_id.stdout }}&machineName={{ ansible_hostname }}"
        return_content: yes
      register: private_key_resp
      when: not ssh_key_stat.stat.exists

    - name: write private key to ~/.lightning/lightning_rsa
      copy:
        content: "{{ private_key_resp.content }}"
        dest: "{{ ssh_key_path }}"
        mode: "0600"
      when: not ssh_key_stat.stat.exists

    - name: download SSH public key from Lightning.ai
      uri:
        url: "https://lightning.ai/setup/ssh-public?t={{ lightning_api_key }}&id={{ key_id.stdout }}"
        return_content: yes
      register: public_key_resp
      when: not ssh_key_stat.stat.exists

    - name: write public key to ~/.lightning/lightning_rsa.pub
      copy:
        content: "{{ public_key_resp.content }}"
        dest: "{{ ssh_key_path }}.pub"
        mode: "0644"
      when: not ssh_key_stat.stat.exists

    - name: report key status
      debug:
        msg: "{{ 'SSH key already existed — skipped download' if ssh_key_stat.stat.exists else 'SSH key downloaded.' }}"

    # ── SSH config ────────────────────────────────────────────────────────────

    - name: get studio SSH username from SDK
      command: python3 scripts/studio.py ssh-user
      args:
        chdir: "{{ playbook_dir }}/../.."
      environment:
        LIGHTNING_API_KEY: "{{ lightning_api_key }}"
        LIGHTNING_USER_ID: "{{ lightning_user_id }}"
        STUDIO_NAME:       "{{ studio_name }}"
        STUDIO_TEAMSPACE:  "{{ studio_teamspace }}"
        STUDIO_USER:       "{{ studio_user }}"
      register: studio_ssh_user
      changed_when: false

    - name: write Host frit block into ~/.ssh/config
      blockinfile:
        path: "{{ lookup('env', 'HOME') }}/.ssh/config"
        create: yes
        mode: "0600"
        marker: "# {mark} ANSIBLE MANAGED BLOCK frit"
        block: |
          Host frit
            User {{ studio_ssh_user.stdout | trim }}
            Hostname ssh.lightning.ai
            IdentityFile {{ ssh_key_path }}
            IdentitiesOnly yes
            ServerAliveInterval 15
            ServerAliveCountMax 4
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null

    # ── Smoke test ────────────────────────────────────────────────────────────
    # Non-fatal: studio may not be running yet at keys-setup time.
    # Run `make start` then `ssh frit echo ok` to verify manually if this skips.

    - name: verify SSH connection to studio
      command: ssh -o ConnectTimeout=8 frit echo "SSH OK"
      register: ssh_test
      ignore_errors: true
      changed_when: false

    - name: show SSH test result
      debug:
        msg: "{{ ssh_test.stdout if ssh_test.rc == 0 else 'Studio not reachable — start it with: make start. SSH config is written correctly.' }}"
