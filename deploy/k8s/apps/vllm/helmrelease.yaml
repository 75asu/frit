---
# vLLM production-stack — the CoreWeave/CNCF reference inference deployment.
# Router: prefix-aware routing (routes to node holding matching KV cache prefix).
# Engine: single T4 (16GB), Phi-3-mini-4k-instruct.
# Model weights: read from /teamspace/studios/this_studio/models/ (persists across T4 restarts).
# HF token: pulled from Vault via hf-token ExternalSecret.
#
# Tune MODEL_NAME in .env — change it there, re-run make bootstrap to reseed Vault,
# then update modelURL here and push to Gitea.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vllm
  namespace: vllm
spec:
  interval: 1h
  timeout: 20m
  chart:
    spec:
      chart: vllm-stack
      version: "0.*"
      sourceRef:
        kind: HelmRepository
        name: vllm
        namespace: flux-system
  values:
    # Engine deployment — one entry per model in the models array.
    # name drives service/resource naming: vllm-{name}-engine-service
    models:
      - name: phi3
        enabled: true
        modelURL: "microsoft/Phi-3-mini-4k-instruct"
        runtimeClassName: "nvidia"
        replicaCount: 1
        requestCPU: "4"
        requestMemory: "16Gi"
        requestGPU: 1
        mountPvcStorage: false  # use hostPath below; skip the default PVC
        hf_token:
          secretName: "hf-token"
          secretKey: "token"
        extraVolumes:
          - name: model-cache
            hostPath:
              path: /teamspace/studios/this_studio/models
              type: DirectoryOrCreate
        extraVolumeMounts:
          - name: model-cache
            mountPath: /root/.cache/huggingface/hub  # HF default cache path
        vllmConfig:
          v0: "1"
          maxModelLen: 4096
          enablePrefixCaching: true
          dtype: auto
          gpuMemoryUtilization: 0.9
          tensorParallelSize: 1
        lmcacheConfig:
          enabled: false  # disable LMCache until engine is stable

    routerSpec:
      replicaCount: 1
      routing: "prefix"  # prefix-aware routing (CoreWeave pattern)
      ingress:
        enabled: true
        className: traefik
        host: vllm.frit.local
      # Give the router time to survive while the engine loads the model (~2-3 min on T4)
      startupProbe:
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 30   # 155s window to start
      livenessProbe:
        initialDelaySeconds: 120  # wait 2min before first liveness check
        periodSeconds: 5
        failureThreshold: 60   # then allow 5min of /health failures while engine connects

    serviceMonitor:
      enabled: true  # exposes TTFT, TBT, queue depth, KV cache hit rate to Prometheus
