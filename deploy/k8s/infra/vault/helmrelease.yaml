---
# Vault — dev/demo config: single node, Raft storage, no TLS, no auto-unseal.
# bootstrap.yaml handles init + unseal + K8s auth config on every `make up`.
# The T4 is ephemeral; PVC data resets on studio restart.
# Source of truth for secrets is .env on the Mac; bootstrap.yaml re-seeds Vault each run.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 1h
  chart:
    spec:
      chart: vault
      version: "0.29.*"
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
  values:
    server:
      ha:
        enabled: false
      standalone:
        enabled: true
        config: |
          ui = false
          listener "tcp" {
            tls_disable = 1
            address = "[::]:8200"
            cluster_address = "[::]:8201"
          }
          storage "raft" {
            path    = "/vault/data"
            node_id = "vault-0"
          }
          service_registration "kubernetes" {}
      dataStorage:
        enabled: true
        storageClass: local-path
        size: 5Gi
      serviceAccount:
        create: true
        name: vault
        annotations:
          # Allows Vault to call the k8s token review API for K8s auth
          {}
    injector:
      enabled: false
    ui:
      enabled: false
