---
# NVIDIA GPU Operator — replaces the manual setup.yml DCGM + toolkit install.
# Handles: device plugin, DCGM exporter, containerd runtime config for k3s.
#
# driver.enabled=false: Lightning.ai T4 already has the NVIDIA driver installed.
# The Operator only installs the device plugin, container toolkit, and DCGM exporter.
#
# k3s-specific: containerd socket and config paths differ from upstream k8s.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-operator
  namespace: gpu-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: gpu-operator
      version: "v24.*"
      sourceRef:
        kind: HelmRepository
        name: nvidia
        namespace: flux-system
  values:
    driver:
      enabled: false
    toolkit:
      enabled: true
      env:
        # k3s uses its own bundled containerd — paths differ from upstream
        - name: CONTAINERD_CONFIG
          value: /var/lib/rancher/k3s/agent/etc/containerd/config.toml
        - name: CONTAINERD_SOCKET
          value: /run/k3s/containerd/containerd.sock
        - name: CONTAINERD_RUNTIME_CLASS
          value: nvidia
        - name: CONTAINERD_SET_AS_DEFAULT
          value: "false"
    devicePlugin:
      enabled: true
    dcgmExporter:
      enabled: true
      serviceMonitor:
        enabled: true
    operator:
      defaultRuntime: containerd
