---
# frit -- GPU foundation for a bare GPU VM.
#
# Managed GPU platforms often hand you a VM with the NVIDIA driver pre-installed;
# a fresh GCP VM does not. This installs the full host GPU stack so `nvidia-smi`,
# DCGM, and
# `docker run --gpus all` all work, then k3s + the GPU Operator take it from there.
#
#   NVIDIA driver (CUDA repo) -> reboot to load -> nvidia-container-toolkit -> DCGM -> Docker
#
# Idempotent: every step checks before acting; the reboot only happens if the
# driver isn't already live.  Run via:  make gpu
- name: frit GPU foundation
  hosts: all
  become: true
  gather_facts: true
  environment:
    PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

  vars:
    # CUDA repo path is OS-specific: 22.04 -> ubuntu2204, 24.04 -> ubuntu2404.
    cuda_distro: "ubuntu{{ ansible_distribution_version | replace('.', '') }}"
    cuda_arch: "x86_64"

  tasks:
    # -- NVIDIA driver (from the CUDA network repo) -----------------------------
    - name: build prerequisites (headers + the gcc the kernel was built with)
      # GCP HWE kernels (e.g. 6.8-gcp) are built with gcc-12, but jammy defaults to
      # gcc-11; NVIDIA's DKMS cc_sanity_check fails on the mismatch. Install gcc-12
      # so the module builds with the kernel's compiler.
      ansible.builtin.apt:
        name:
          - "linux-headers-{{ ansible_kernel }}"
          - gcc-12
          - dkms
          - build-essential
        update_cache: true
        state: present

    - name: CUDA repo keyring
      ansible.builtin.apt:
        deb: "https://developer.download.nvidia.com/compute/cuda/repos/{{ cuda_distro }}/{{ cuda_arch }}/cuda-keyring_1.1-1_all.deb"
        state: present

    - name: is the driver already live?
      ansible.builtin.command: nvidia-smi -L
      register: smi_pre
      changed_when: false
      failed_when: false

    - name: install NVIDIA driver (cuda-drivers meta-package)
      ansible.builtin.apt:
        name: cuda-drivers
        update_cache: true
        state: present
      when: smi_pre.rc != 0

    - name: try to load the driver without a reboot
      ansible.builtin.command: modprobe nvidia
      register: modprobe_nvidia
      changed_when: modprobe_nvidia.rc == 0
      failed_when: false
      when: smi_pre.rc != 0

    - name: re-check nvidia-smi after modprobe
      ansible.builtin.command: nvidia-smi -L
      register: smi_mid
      changed_when: false
      failed_when: false
      when: smi_pre.rc != 0

    - name: reboot to load the driver (only if it is still not live)
      ansible.builtin.reboot:
        reboot_timeout: 420
        post_reboot_delay: 15
      when:
        - smi_pre.rc != 0
        - smi_mid.rc | default(1) != 0

    # -- nvidia-container-toolkit (GPU into Docker containers) -------------------
    - name: nvidia-container-toolkit GPG key
      ansible.builtin.shell: |
        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey \
          | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
      args:
        creates: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg

    - name: nvidia-container-toolkit apt repo
      ansible.builtin.shell: |
        curl -sL https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list \
          | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' \
          > /etc/apt/sources.list.d/nvidia-container-toolkit.list
      args:
        creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

    # -- Docker (official repo) + DCGM + the toolkit ----------------------------
    - name: Docker apt key
      ansible.builtin.shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Docker apt repo
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: install toolkit + DCGM + Docker
      ansible.builtin.apt:
        name:
          - nvidia-container-toolkit
          - datacenter-gpu-manager
          - docker-ce
          - docker-ce-cli
          - containerd.io
        update_cache: true
        state: present

    - name: configure Docker to use the NVIDIA runtime
      ansible.builtin.command: nvidia-ctk runtime configure --runtime=docker
      register: ctk
      changed_when: "'already' not in ctk.stdout | default('')"
      notify: restart docker

    - name: enable + start Docker and DCGM
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - docker
        - nvidia-dcgm

    # -- Verify -----------------------------------------------------------------
    - name: nvidia-smi
      ansible.builtin.command: nvidia-smi --query-gpu=name,memory.total,driver_version --format=csv,noheader
      register: smi
      changed_when: false

    - name: DCGM sees the GPU
      ansible.builtin.command: dcgmi discovery -l
      register: dcgm
      changed_when: false
      failed_when: false

    - name: GPU foundation ready
      ansible.builtin.debug:
        msg:
          - "GPU      : {{ smi.stdout }}"
          - "DCGM     : {{ 'ok' if dcgm.rc == 0 else 'check (rc=' ~ dcgm.rc ~ ')' }}"

  handlers:
    - name: restart docker
      ansible.builtin.systemd:
        name: docker
        state: restarted
